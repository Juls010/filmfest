{% extends 'base.html' %}
{% block title %}Eliminar {{ tipo }} — FilmFest{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card p-5">
            <div class="display-1 mb-3">⚠️</div>
            <h2 class="fw-bold">¿Eliminar {{ tipo }}?</h2>
            <p class="text-muted mt-2">Vas a eliminar <strong>{{ objeto }}</strong>. Esta acción no se puede deshacer.</p>
            <form method="post" class="d-flex gap-3 justify-content-center mt-4">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger btn-lg">Sí, eliminar</button>
                <a href="javascript:history.back()" class="btn btn-outline-secondary btn-lg">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
